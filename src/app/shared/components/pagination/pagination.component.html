<button
  [disabled]="disablePrev()"
  (click)="onPrevClick()"
  class="disabled:bg-sky-300/40 disabled:cursor-not-allowed flex items-center gap-1.5"
  [ngClass]="
    type() === 'default'
      ? 'absolute top-1/2 -left-4 shadow-lg p-2 rounded-full bg-sky-300 cursor-pointer'
      : 'text-white bg-sky-800 rounded-md px-6 py-2 justify-center gap-1 '
  ">
  @if (type() === 'default' ) {
  <i class="bi bi-arrow-left h-4 w-4 fill-current inline-block"></i>
  } @else {
  <i class="bi bi-chevron-double-left w-3 h-3 inline-block"></i>
  Précédent }
</button>
<button
  [disabled]="disableNext()"
  (click)="onNextClick()"
  class="disabled:bg-sky-300/40 disabled:cursor-not-allowed flex items-center gap-1.5"
  [ngClass]="
    type() === 'default'
      ? 'absolute top-1/2 -right-4 shadow-lg p-2 rounded-full bg-sky-300 cursor-pointer'
      : 'text-white bg-sky-800 rounded-md px-6 py-2 justify-center gap-1'
  ">
  @if (type() === 'default') {
  <i class="bi bi-arrow-right h-4 w-4 fill-current inline-block"></i>
  } @else { Suivant
  <i class="bi bi-chevron-double-right w-3 h-3 fill-current inline-block"></i>
  }
</button>
